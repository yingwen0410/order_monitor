; ============================================================
; config.ini — 訂單未交量報表產生器設定檔
; ============================================================
; 此檔案為首次安裝時的預設值。
; 使用者在 UI 上選擇的路徑會另存至 paths.json，
; 下次開啟時優先使用 paths.json 中記錄的路徑。

[paths]
; 【訂單資訊管制表】的預設 NAS 路徑
default_excel = \\192.168.X.X\Share\Order_List.xlsx

; 【生產記錄表】（允備貨清單）的預設路徑（留空表示每次由使用者選擇）
default_plan_excel =

; 來源 Excel 中要讀取的工作表名稱
source_sheet  = 待出貨-膜類

[options]
; 是否略過未交量=0 的列（true/false）
skip_zero_undelivered = true
